openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: messages
    description: Chat messages
  - name: apikeys
    description: API key management
  - name: upload
    description: File upload

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid password

  /messages:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get all messages
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: before
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized

  /upload:
    post:
      operationId: uploadImage
      tags: [upload]
      summary: Upload an image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadInput"
      responses:
        "200":
          description: Uploaded image URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "401":
          description: Unauthorized

  /apikeys:
    get:
      operationId: listApiKeys
      tags: [apikeys]
      summary: List all API keys
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
        "401":
          description: Unauthorized
    post:
      operationId: createApiKey
      tags: [apikeys]
      summary: Generate a new API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyInput"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
        "401":
          description: Unauthorized

  /apikeys/{id}:
    delete:
      operationId: deleteApiKey
      tags: [apikeys]
      summary: Delete an API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AuthResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    Message:
      type: object
      required: [id, content, type, username, createdAt]
      properties:
        id:
          type: integer
        content:
          type: string
        type:
          type: string
          enum: [text, image]
        imageUrl:
          type: ["string", "null"]
        username:
          type: string
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [content, type, username]
      properties:
        content:
          type: string
        type:
          type: string
          enum: [text, image]
        imageUrl:
          type: ["string", "null"]
        username:
          type: string

    UploadInput:
      type: object
      properties:
        filename:
          type: string

    UploadResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string

    ApiKey:
      type: object
      required: [id, key, name, createdAt]
      properties:
        id:
          type: integer
        key:
          type: string
        name:
          type: string
        createdAt:
          type: string

    ApiKeyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
